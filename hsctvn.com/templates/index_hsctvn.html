<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu mã số thuế - HSCTVN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 15px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 12px 30px;
            font-weight: 600;
        }
        .btn-secondary:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        h2 {
            color: white;
            font-weight: 700;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">🔍 Tra cứu Mã Số Thuế</h2>
            <p class="text-center text-white mb-4">Tìm kiếm trên <strong>hsctvn.com</strong></p>

            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong>Lỗi!</strong> {{ error }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endif %}

            <div class="card p-5">
                <form method="POST">
                    <div class="mb-3">
                        <label for="tax_code" class="form-label fw-bold">Nhập mã số thuế:</label>
                        <input type="text" name="tax_code" id="tax_code" class="form-control"
                               placeholder="Ví dụ: 0105364621" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">
                        🔍 Tìm kiếm
                    </button>
                    <a href="/batch" class="btn btn-secondary w-100">
                        📊 Tìm kiếm hàng loạt
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
